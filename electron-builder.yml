appId: com.lxserver.desktop
productName: LX Music Server
copyright: "Copyright © 2026 2406498704@qq.com"

# 覆盖 package.json 的 main 字段，让 Electron 使用 electron/main.js 而非 index.js
extraMetadata:
  main: electron/main.js
  description: LX Music Sync Server Desktop

# [核心修复] 禁用打包时的原生模块自动重编，防止本地因缺少 C++ 编译环境而报错
npmRebuild: false

directories:
  output: dist-electron

# 打包进 asar 的文件（排除源码、Docker、开发工具等）
files:
  - server/**/*
  - public/**/*
  - index.js
  - config.js
  - package.json
  - electron/main.js
  - electron/icons/**/*
  - "!src"
  - "!scripts"
  - "!docs"
  - "!md"
  - "!logs"
  - "!data"
  - "!cache"
  - "!*.ts"
  - "!tsconfig.json"
  - "!ecosystem.config.js"
  - "!Dockerfile*"
  - "!docker-compose*"
  - "!.github"
  - "!electron-builder.yml"

# 原生 .node 文件必须解压到 asar 外部才能被 Node.js 加载
asarUnpack:
  - node_modules/music-tag-native/**/*
  - node_modules/bufferutil/**/*
  - node_modules/utf-8-validate/**/*
  - public/**/*

# 应用图标（提供 512x512 PNG，electron-builder 自动生成 ico / icns）
icon: electron/icons/icon.png

# ── Windows ──────────────────────────────────────────────────────────────────
win:
  # 统一命名：文件名会根据架构自动变化，例如：LX Music Server 1.8.0 x64.exe
  artifactName: "${productName} ${version} ${arch}.${ext}"
  target:
    # ── 独立架构安装包 ──
    - target: nsis
      arch: [x64, ia32, arm64]
    # ── 便携绿色版 (分架构) ──
    - target: portable
      arch: [x64, ia32, arm64]
  requestedExecutionLevel: asInvoker

nsis:
  artifactName: "${productName} ${version} ${arch} Setup.${ext}"
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  allowElevation: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "LX Music Server"

portable:
  artifactName: "${productName} ${version} ${arch} Portable.${ext}"

# ── macOS ────────────────────────────────────────────────────────────────────
mac:
  # 统一命名文件名
  artifactName: "${productName} ${version} ${arch}.${ext}"
  target:
    # 产生独立架构镜像 (x64 和 arm64 分开)
    - target: dmg
      arch: [x64, arm64]
  category: public.app-category.utilities

# ── Linux ────────────────────────────────────────────────────────────────────
linux:
  # 统一命名文件名
  artifactName: "${productName} ${version} ${arch}.${ext}"
  target:
    # 为三个主流 Linux 架构创建独立包 (deb 和 AppImage)
    - target: AppImage
      arch: [x64, arm64, armv7l]
    - target: deb
      arch: [x64, arm64, armv7l]
  category: Utility
